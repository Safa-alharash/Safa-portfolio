<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>   
    
    <script>
        $(document).ready(function(){
            // كود التفاعل عند إرسال النموذج
            $("form").submit(function(event){
                event.preventDefault(); // منع الصفحة من إعادة التحميل
                alert("Thank you! Your message has been sent successfully.");
                this.reset(); // تفريغ الحقول بعد الإرسال
            });
        });
    </script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Safa portfolio</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="blog.html">Blog</a>
                <a class="nav-link" href="products.html">Products</a>
                <a class="nav-link" href="calculator.html">Calculator</a>
                <a class="nav-link" href="contact.html">Contact</a>
            </div>
        </div>
    </nav> 

    <main class="container my-5">
        <h1 class="text-center mb-4">Contact Me</h1>
        <p class="text-center text-muted mb-5">Have a question or want to work together? Drop me a message!</p>
        
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card p-4 shadow-sm">
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="subject" class="form-label">Subject</label>
                            <input type="text" class="form-control" id="subject" placeholder="What is this about?" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" rows="5" placeholder="Write your message here..." required></textarea>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Safa Portfolio. All Rights Reserved.</p>
    </footer>

</body>
</html>
