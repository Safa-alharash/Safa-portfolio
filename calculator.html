<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>  
      <script>
        
        let screen;

    
        $(document).ready(function() {
            screen = document.getElementById('screen');
        });

        function appendValue(value) {
            if (screen.value === '0' && value !== '.') {
                screen.value = value;
            } else {
                screen.value += value;
            }
        }

        function clearScreen() {
            screen.value = '0';
        }

        function calculateResult() {
            try {
                screen.value = eval(screen.value);
            } catch (error) {
                screen.value = 'Error';
            }
        }
    </script>
    </head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Safa portfolio</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="blog.html">Blog</a>
                <a class="nav-link" href="products.html">Products</a>
                <a class="nav-link" href="calculator.html">Calculator</a>
                <a class="nav-link" href="contact.html">Contact</a>
            </div>
        </div>
    </nav> 

    <main class="container my-5">
        <h1 class="text-center mb-5">Web Calculator</h1>
        
        <div class="calc-body">
            <input type="text" class="calc-screen" id="screen" readonly value="0">
            
            <div class="row g-2">
                <div class="col-3"><button class="btn btn-danger w-100 calc-btn" onclick="clearScreen()">C</button></div>
                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" onclick="appendValue('/')">/</button></div>
                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" onclick="appendValue('*')">*</button></div>
                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" onclick="appendValue('-')">-</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('7')">7</button></div>
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('8')">8</button></div>
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('9')">9</button></div>
                <div class="col-3" style="grid-row: span 2;"><button class="btn btn-secondary w-100 calc-btn h-100" onclick="appendValue('+')">+</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('4')">4</button></div>
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('5')">5</button></div>
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('6')">6</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('1')">1</button></div>   


<div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('2')">2</button></div>
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('3')">3</button></div>
                <div class="col-3" style="grid-row: span 2;"><button class="btn btn-primary w-100 calc-btn h-100" onclick="calculateResult()">=</button></div>
                
                <div class="col-6"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('0')">0</button></div>
                <div class="col-3"><button class="btn btn-light w-100 calc-btn" onclick="appendValue('.')">.</button></div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Safa Portfolio. All Rights Reserved.</p>
    </footer>

   
</body>
</html>
